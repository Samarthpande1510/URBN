services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: urbn
      POSTGRES_PASSWORD: urbn_dev_pass
      POSTGRES_DB: urbn_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U urbn -d urbn_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
